<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo circular rosa/amarillo -->
  <circle cx="50" cy="50" r="48" fill="#fbbf24"/>
  
  <!-- Alas -->
  <ellipse cx="35" cy="35" rx="15" ry="20" fill="#ffffff" opacity="0.7" transform="rotate(-20 35 35)"/>
  <ellipse cx="65" cy="35" rx="15" ry="20" fill="#ffffff" opacity="0.7" transform="rotate(20 65 35)"/>
  
  <!-- Cuerpo de la abeja -->
  <ellipse cx="50" cy="55" rx="22" ry="28" fill="#1f2937"/>
  
  <!-- Rayas amarillas -->
  <rect x="28" y="45" width="44" height="5" fill="#fbbf24"/>
  <rect x="28" y="58" width="44" height="5" fill="#fbbf24"/>
  <rect x="28" y="71" width="44" height="5" fill="#fbbf24"/>
  
  <!-- Ojos -->
  <circle cx="42" cy="40" r="3" fill="#ffffff"/>
  <circle cx="58" cy="40" r="3" fill="#ffffff"/>
  <circle cx="42" cy="40" r="1.5" fill="#1f2937"/>
  <circle cx="58" cy="40" r="1.5" fill="#1f2937"/>
  
  <!-- Sonrisa -->
  <path d="M 42 48 Q 50 52 58 48" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>